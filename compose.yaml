services:
  gscore-qq:
    build: .
    image: gscore-qqofficial:latest
    restart: unless-stopped
    init: true
    environment:
      QQ_APP_ID: ${QQ_APP_ID}
      QQ_APP_SECRET: ${QQ_APP_SECRET}
      GSCORE_URL: ${GSCORE_URL:-ws://host.docker.internal:8765/ws/QQOfficial}
      GSCORE_TOKEN: ${GSCORE_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m
    stop_grace_period: 20s
